<div class="atomic-widget atomic-widget--lastfm" data-atomic-widget>
  <a class="widget-fallback" href="https://www.last.fm/user/thenitwit">View my Last.fm profile</a>
  <script src="https://recentfm.rknight.me/now.js?u=thenitwit&nomoji=true"></script>
</div>
<noscript><a class="widget-fallback" href="https://www.last.fm/user/thenitwit">View my Last.fm profile</a></noscript>

<script>
  (function() {
    function reveal(root) {
      const wrapper = root.closest('[data-atomic-widget]') || root;
      root.classList.add('is-ready');
      wrapper.classList.add('is-ready');
    }

    function waitForImage(img) {
      if (!img) return Promise.resolve();
      if (img.complete) return Promise.resolve();
      return new Promise(resolve => {
        const done = () => resolve();
        img.addEventListener('load', done, { once: true });
        img.addEventListener('error', done, { once: true });
      }).then(() => {
        if (img.decode) return img.decode().catch(() => {});
      });
    }

    function withTimeout(promise, ms) {
      return Promise.race([
        promise,
        new Promise(resolve => setTimeout(resolve, ms))
      ]);
    }

    function placeGif(root) {
      // already placed?
      const existing = root.querySelector('.recent-gif');
      if (existing) return existing;

      // create the gif only now (after widget exists)
      const gif = document.createElement('img');
      gif.src = '{{ "/assets/red_circle.gif" | relative_url }}';
      gif.alt = '';
      gif.setAttribute('aria-hidden', 'true');
      gif.className = 'recent-gif recent-gif--inline';

      const art = root.querySelector('.recent-played-art');
      const track = root.querySelector('.recent-played-track');

      if (art) {
        art.after(gif);
      } else if (track) {
        root.insertBefore(gif, track);
      } else {
        root.appendChild(gif);
      }

      return gif;
    }

    function tryEnhance(root) {
      if (!root) return;
      if (root.dataset.atomicStarted === 'true') return;
      root.dataset.atomicStarted = 'true';
      const fallback = root.closest('[data-atomic-widget]')?.querySelector('.widget-fallback');
      if (fallback) fallback.hidden = true;

      // Move/create GIF first so it's part of the widget render
      const gif = placeGif(root);

      // If art already present, we're done
      const existingArt = root.querySelector('.recent-played-art');
      if (existingArt) {
        withTimeout(Promise.all([waitForImage(gif), waitForImage(existingArt)]), 2500).then(() => reveal(root));
        return;
      }

      const link = root.querySelector('.recent-played-track a');
      if (!link) {
        withTimeout(waitForImage(gif), 1500).then(() => reveal(root));
        return;
      }

      const txt = link.textContent.trim();
      const SEP = ' by ';
      if (!txt.includes(SEP)) {
        withTimeout(waitForImage(gif), 1500).then(() => reveal(root));
        return;
      }
      const [title, artist] = txt.split(SEP);
      if (!title || !artist) {
        withTimeout(waitForImage(gif), 1500).then(() => reveal(root));
        return;
      }

      const cacheKey = `art:${title}::${artist}`;
      const cached = sessionStorage.getItem(cacheKey);
      if (cached) {
        const art = insert(root, title, artist, cached);
        withTimeout(Promise.all([waitForImage(gif), waitForImage(art)]), 2500).then(() => reveal(root));
        return;
      }

      const params = new URLSearchParams({
        term: `${title} ${artist}`,
        entity: 'song',
        limit: '1'
      });
      fetch(`https://itunes.apple.com/search?${params.toString()}`)
        .then(r => r.json())
        .then(data => {
          const hit = data && data.results && data.results[0];
          let art = hit && hit.artworkUrl100;
          if (art) art = art.replace(/100x100bb\.jpg/, '300x300bb.jpg');
          if (art) {
            sessionStorage.setItem(cacheKey, art);
            const img = insert(root, title, artist, art);
            withTimeout(Promise.all([waitForImage(gif), waitForImage(img)]), 2500).then(() => reveal(root));
          } else {
            withTimeout(waitForImage(gif), 1500).then(() => reveal(root));
          }
        })
        .catch(() => {
          withTimeout(waitForImage(gif), 1500).then(() => reveal(root));
        });
    }

    function insert(root, title, artist, src) {
      const existing = root.querySelector('.recent-played-art');
      if (existing) return existing;
      const img = document.createElement('img');
      img.className = 'recent-played-art';
      img.alt = `${title} — ${artist} (cover art)`;
      img.loading = 'lazy';
      img.decoding = 'async';
      img.src = src;
      root.prepend(img);
      return img;
    }

    // If it's already on the page (fast load), enhance immediately.
    const existing = document.querySelector('.recent-played');
    if (existing) tryEnhance(existing);

    // Otherwise, observe for widget arrival.
    const mo = new MutationObserver(muts => {
      for (const m of muts) {
        m.addedNodes && m.addedNodes.forEach(node => {
          if (node.nodeType === 1) {
            if (node.matches && node.matches('.recent-played')) tryEnhance(node);
            const found = node.querySelector && node.querySelector('.recent-played');
            if (found) tryEnhance(found);
          }
        });
      }
    });
    mo.observe(document.documentElement, { childList: true, subtree: true });

    setTimeout(() => {
      document.querySelectorAll('.atomic-widget--lastfm').forEach(el => {
        if (!el.classList.contains('is-ready') && !el.querySelector('.recent-played')) {
          el.classList.add('is-ready');
          const fallback = el.querySelector('.widget-fallback');
          if (fallback) fallback.hidden = false;
        }
      });
    }, 5000);
  })();
</script>
