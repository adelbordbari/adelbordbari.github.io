---
layout: default
---

<main class="photo-page photo-page--single">
  <article class="photo-single">
    <a class="photo-single__back" href="{{ '/photo/' | relative_url }}">Photos</a>

    <figure>
      <img src="{{ page.image | relative_url }}" alt="{{ page.title | escape }}">
      <figcaption>
        <h1>{{ page.title }}</h1>
        <p>{{ page.date | date: site.date_format }}</p>
      </figcaption>
    </figure>

    {% if content != "" %}
      <div class="photo-single__notes">
        {{ content }}
      </div>
    {% endif %}
  </article>
</main>
